<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSU Lost & Found - Create New Password</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-message {
            background-color: #D1FAE5;
            color: #065F46;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid #059669;
            animation: slideDown 0.3s ease-out;
        }
        
        .success-icon {
            font-size: 1.125rem;
            flex-shrink: 0;
        }
        
        .form-hint {
            font-size: 0.75rem;
            color: #6B7280;
            margin-top: 0.25rem;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="gsu-logo">
                <h1 class="gsu-title">Georgia State University</h1>
            </div>
            <h2 class="app-title">Create New Password</h2>
        </div>

        <form id="resetPasswordForm" class="login-form">
            <div id="successMessage" class="success-message" style="display: none;">
                <span class="success-icon">✓</span>
                <span id="successText"></span>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;">
                <span class="error-icon">⚠️</span>
                <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="newPassword" class="form-label">New Password</label>
                <input 
                    type="password" 
                    id="newPassword" 
                    name="newPassword" 
                    class="form-input" 
                    placeholder="Enter new password"
                    autocomplete="new-password"
                >
                <span class="field-error" id="passwordError"></span>
                <small class="form-hint">Must be at least 8 characters</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    class="form-input" 
                    placeholder="Confirm new password"
                    autocomplete="new-password"
                >
                <span class="field-error" id="confirmError"></span>
            </div>

            <button type="submit" id="resetButton" class="login-button">
                <span id="buttonText">Reset Password</span>
                <span id="loadingSpinner" class="spinner" style="display: none;">
                    <span class="spinner-icon">◌</span>
                </span>
            </button>

            <div class="signup-link">
                <a href="login.html" class="link-primary">← Back to Login</a>
            </div>
        </form>

        <div class="login-footer">
            <p class="footer-text">© 2025 Georgia State University</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetPasswordForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const resetButton = document.getElementById('resetButton');
        const buttonText = document.getElementById('buttonText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        function showFieldError(errorElement, message) {
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        function clearFieldError(errorElement) {
            errorElement.textContent = '';
            errorElement.classList.remove('show');
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'flex';
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMessage.style.display = 'flex';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        function showLoading() {
            resetButton.disabled = true;
            buttonText.style.display = 'none';
            loadingSpinner.style.display = 'inline-block';
        }

        function hideLoading() {
            resetButton.disabled = false;
            buttonText.style.display = 'inline';
            loadingSpinner.style.display = 'none';
        }

        if (!token || !email) {
            showError('Invalid reset link. Please request a new password reset.');
            resetButton.disabled = true;
        }

        newPasswordInput.addEventListener('input', () => {
            clearFieldError(passwordError);
            hideMessages();
        });

        confirmPasswordInput.addEventListener('input', () => {
            clearFieldError(confirmError);
            hideMessages();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            clearFieldError(passwordError);
            clearFieldError(confirmError);
            hideMessages();
            
            const newPassword = newPasswordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();
            
            let hasError = false;
            
            if (!newPassword) {
                showFieldError(passwordError, 'Password is required');
                hasError = true;
            } else if (newPassword.length < 8) {
                showFieldError(passwordError, 'Password must be at least 8 characters');
                hasError = true;
            }
            
            if (!confirmPassword) {
                showFieldError(confirmError, 'Please confirm your password');
                hasError = true;
            } else if (newPassword !== confirmPassword) {
                showFieldError(confirmError, 'Passwords do not match');
                hasError = true;
            }
            
            if (hasError) return;
            
            try {
                showLoading();
                
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email,
                        token: token,
                        new_password: newPassword 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess(data.message || 'Password reset successful! Redirecting to login...');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showError(data.error || 'Failed to reset password. Please try again.');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
