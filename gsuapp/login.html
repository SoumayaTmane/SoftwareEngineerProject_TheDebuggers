<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSU Lost & Found - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <!-- GSU Branding Header -->
        <div class="login-header">
            <div class="gsu-logo">
                <!-- You can add GSU logo image here -->
                <h1 class="gsu-title">Georgia State University</h1>
            </div>
            <h2 class="app-title">Lost & Found System</h2>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="login-form">
            <!-- Error Message Container (Hidden by default) -->
            <div id="errorMessage" class="error-message" style="display: none;">
                <span class="error-icon">⚠️</span>
                <span id="errorText"></span>
            </div>

            <!-- Email/Username Field -->
            <div class="form-group">
                <label for="email" class="form-label">GSU Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="yourname@student.gsu.edu"
                    autocomplete="email"
                >
                <span class="field-error" id="emailError"></span>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                >
                <span class="field-error" id="passwordError"></span>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe" class="checkbox-label">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="loginButton" class="login-button">
                <span id="buttonText">Sign In</span>
                <span id="loadingSpinner" class="spinner" style="display: none;">
                    <span class="spinner-icon">◌</span>
                </span>
            </button>

            <!-- Sign Up Link -->
            <div class="signup-link">
                Don't have an account? <a href="signup.html" class="link-primary">Sign Up</a>
            </div>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p class="footer-text">© 2025 Georgia State University</p>
            <div class="footer-links">
                <a href="#" class="footer-link">Privacy Policy</a>
                <span class="separator">•</span>
                <a href="#" class="footer-link">Terms of Service</a>
                <span class="separator">•</span>
                <a href="#" class="footer-link">Help</a>
            </div>
        </div>
    </div>

    <!-- JavaScript for form validation and Supabase -->
    <script src="login.js"></script>
</body>
</html>
