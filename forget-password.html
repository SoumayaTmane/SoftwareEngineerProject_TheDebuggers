<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSU Lost & Found - Forgot Password</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-message {
            background-color: #D1FAE5;
            color: #065F46;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid #059669;
            animation: slideDown 0.3s ease-out;
        }
        
        .success-icon {
            font-size: 1.125rem;
            flex-shrink: 0;
        }
        
        .form-hint {
            font-size: 0.75rem;
            color: #6B7280;
            margin-top: 0.25rem;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="gsu-logo">
                <h1 class="gsu-title">Georgia State University</h1>
            </div>
            <h2 class="app-title">Reset Your Password</h2>
        </div>

        <form id="forgotPasswordForm" class="login-form">
            <div id="successMessage" class="success-message" style="display: none;">
                <span class="success-icon">✓</span>
                <span id="successText"></span>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;">
                <span class="error-icon">⚠️</span>
                <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">GSU Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="yourname@student.gsu.edu"
                    autocomplete="email"
                    required
                >
                <span class="field-error" id="emailError"></span>
                <small class="form-hint">Enter your GSU email to receive a password reset link.</small>
            </div>

            <button type="submit" id="resetButton" class="login-button">
                <span id="buttonText">Send Reset Link</span>
                <span id="loadingSpinner" class="spinner" style="display: none;">
                    <span class="spinner-icon">◌</span>
                </span>
            </button>

            <div class="signup-link">
                <a href="login.html" class="link-primary">← Back to Login</a>
            </div>
        </form>

        <div class="login-footer">
            <p class="footer-text">© 2025 Georgia State University</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const resetButton = document.getElementById('resetButton');
        const buttonText = document.getElementById('buttonText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const emailError = document.getElementById('emailError');

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@gsu\.edu$/i;
            return emailRegex.test(email);
        }

        function showFieldError(errorElement, message) {
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        function clearFieldError(errorElement) {
            errorElement.textContent = '';
            errorElement.classList.remove('show');
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'flex';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMessage.style.display = 'flex';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 5000);
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        function showLoading() {
            resetButton.disabled = true;
            buttonText.style.display = 'none';
            loadingSpinner.style.display = 'inline-block';
        }

        function hideLoading() {
            resetButton.disabled = false;
            buttonText.style.display = 'inline';
            loadingSpinner.style.display = 'none';
        }

        emailInput.addEventListener('input', () => {
            clearFieldError(emailError);
            hideMessages();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            clearFieldError(emailError);
            hideMessages();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showFieldError(emailError, 'Email is required');
                return;
            }
            
            if (!validateEmail(email)) {
                showFieldError(emailError, 'Please enter a valid GSU email (@gsu.edu)');
                return;
            }
            
            try {
                showLoading();
                
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess(data.message || 'Password reset link has been sent to your email!');
                    emailInput.value = '';
                } else {
                    showError(data.error || 'Something went wrong. Please try again.');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
